<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴミ出しアラーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --text: #222; --muted: rgba(0,0,0,0.4); --border: rgba(0,0,0,0.1);
    --surface: rgba(255,255,255,0.5); --card: rgba(255,255,255,0.45);
  }

  /* 曜日ごとの背景グラデーション */
  body.day-0 { background: linear-gradient(160deg, #efebf9 0%, #e8e2f5 60%, #efebf9 100%); } /* 日：Selago */
  body.day-1 { background: linear-gradient(160deg, #e8e0ee 0%, #decee2 60%, #d8c8dc 100%); } /* 月：Subtle Purple */
  body.day-2 { background: linear-gradient(160deg, #d4da9a 0%, #b6c161 60%, #a8b450 100%); } /* 火：Wild Willow */
  body.day-3 { background: linear-gradient(160deg, #383a55 0%, #424360 60%, #2e2f48 100%); } /* 水：Neutral Navy */
  body.day-4 { background: linear-gradient(160deg, #e4e4d8 0%, #dadacd 60%, #d0d0c2 100%); } /* 木：Summer Pearl */
  body.day-5 { background: linear-gradient(160deg, #d4c4e0 0%, #c2adcd 60%, #b89ec4 100%); } /* 金：Transparent Lavender */
  body.day-6 { background: linear-gradient(160deg, #decee2 0%, #c2adcd 40%, #b6c161 100%); } /* 土：Subtle→Lavender→Willow */

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Zen Kaku Gothic New', sans-serif; color: var(--text); min-height: 100vh; padding: 0 0 80px; transition: background 1s; }

  /* ヘッダークロック */
  .clock-header {
    padding: 32px 20px 28px;
    text-align: center;
    position: relative;
  }

  .today-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .clock-time {
    font-family: 'Space Mono', monospace;
    font-size: 3.8rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 4px;
    color: #1a1a2e;
    text-shadow: none;
    transition: color 0.5s;
  }
  body.day-3 .clock-time { color: #c2adcd; }
  body.day-3 .today-date { color: rgba(194,173,205,0.7); }
  body.day-3 .today-dow { color: #c2adcd !important; }

  .today-dow {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    margin-bottom: 20px;
  }

  /* 曜日ごとのアクセントカラー */
  body.day-0 .today-dow { color: #5a5080; }
  body.day-1 .today-dow { color: #6a5070; }
  body.day-2 .today-dow { color: #4a5010; }
  body.day-3 .today-dow { color: #c2adcd; }
  body.day-4 .today-dow { color: #7a7a60; }
  body.day-5 .today-dow { color: #5a4a70; }
  body.day-6 .today-dow { color: #4a5010; }

  body.day-0 .accent { color: #5a5080; }
  body.day-1 .accent { color: #6a5070; }
  body.day-2 .accent { color: #4a5010; }
  body.day-3 .accent { color: #c2adcd; }
  body.day-4 .accent { color: #7a7a60; }
  body.day-5 .accent { color: #5a4a70; }
  body.day-6 .accent { color: #4a5010; }

  /* 次のゴミバナー */
  .next-card {
    margin: 0 16px 8px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .next-card .next-emoji { font-size: 2.4rem; }
  .next-card .next-label { font-size: 0.7rem; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.1em; margin-bottom: 3px; }
  .next-card .next-msg { font-size: 1.05rem; font-weight: 700; color: #1a1a2e; }
  .next-card .next-date { font-size: 0.78rem; color: var(--muted); font-family: 'Space Mono', monospace; margin-top: 2px; }

  /* 今日のゴミ */
  .today-gomi {
    margin: 0 16px 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.85rem;
    color: var(--muted);
    display: none;
  }
  .today-gomi.visible { display: block; }
  .today-gomi strong { color: #1a1a2e; font-size: 1rem; }

  /* 仕切り */
  .divider { margin: 0 16px 16px; border: none; border-top: 1px solid var(--border); }

  /* 通知ボタン */
  .notify-wrap { padding: 0 16px; margin-bottom: 16px; }
  .notify-btn { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); color: #1a1a2e; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 9px 16px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif; transition: background 0.2s; }
  .notify-btn:hover { background: rgba(0,0,0,0.14); }
  .notify-btn.granted { background: rgba(46,204,113,0.25); border-color: #2ecc71; color: #2ecc71; }

  .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; padding: 0 16px; font-family: 'Space Mono', monospace; }

  .gomi-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; padding: 0 16px; }

  .gomi-card { background: var(--card); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: 12px; padding: 14px; display: grid; grid-template-columns: auto 1fr auto auto auto; align-items: center; gap: 10px; position: relative; overflow: hidden; }
  .gomi-card-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: rgba(0,0,0,0.12) !important; }
  .gomi-emoji { font-size: 1.8rem; width: 40px; text-align: center; }
  .gomi-info { min-width: 0; }
  .gomi-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
  .gomi-days { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .gomi-days span { display: inline-block; background: rgba(255,255,255,0.08); border-radius: 3px; padding: 1px 5px; margin-right: 3px; }
  .weeks-badge { display: inline-block; background: rgba(255,200,50,0.15); color: #ffd700; border-radius: 3px; padding: 1px 5px; font-size: 0.68rem; margin-left: 2px; font-family: 'Space Mono', monospace; }
  .gomi-next-date { font-size: 0.7rem; color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; margin-top: 2px; }

  .toggle-btn { width: 42px; height: 22px; background: rgba(255,255,255,0.6); border-radius: 11px; border: none; cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
  .toggle-btn::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; }
  .toggle-btn.on { background: #909090; }
  .toggle-btn.on::after { transform: translateX(20px); }
  .edit-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 9px; font-size: 0.72rem; cursor: pointer; font-family: 'Zen Kaku Gothic New', sans-serif; transition: color 0.2s; }
  .edit-btn:hover { color: var(--text); }

  .add-new-btn { background: none; border: 2px dashed rgba(255,255,255,0.15); color: var(--muted); border-radius: 12px; padding: 14px; font-size: 0.88rem; cursor: pointer; width: 100%; font-family: 'Zen Kaku Gothic New', sans-serif; transition: border-color 0.2s, color 0.2s; margin: 0 0 12px; }
  .add-new-btn:hover { border-color: rgba(255,255,255,0.35); color: #1a1a2e; }
  .add-new-wrap { padding: 0 16px; }

  /* フォーム */
  .add-form { background: rgba(255,255,255,0.55); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin: 0 16px 28px; }
  .form-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  label { font-size: 0.75rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  input[type="text"], input[type="time"], select { background: rgba(255,255,255,0.7); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.92rem; font-family: 'Zen Kaku Gothic New', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, select:focus { border-color: rgba(255,255,255,0.4); }
  select option { background: #f0f0f0; color: #222; }
  .day-checkboxes, .week-checkboxes { display: flex; gap: 8px; flex-wrap: wrap; }
  .day-check, .week-check { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .day-check input[type="checkbox"], .week-check input[type="checkbox"] { width: 20px; height: 20px; accent-color: #4ecdc4; cursor: pointer; }
  .day-check span, .week-check span { font-size: 0.72rem; color: var(--muted); font-family: 'Space Mono', monospace; }
  .week-note { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }
  .alarm-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  .alarm-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .alarm-row input[type="time"] { width: 130px; flex-shrink: 0; }
  .alarm-row select { width: 155px; flex-shrink: 0; }
  .rm-alarm { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; width: 28px; height: 28px; cursor: pointer; font-size: 1rem; transition: color 0.2s; }
  .rm-alarm:hover { color: #ff6b6b; }
  .add-alarm-btn { background: none; border: 1px dashed var(--border); color: var(--muted); border-radius: 8px; padding: 8px; font-size: 0.8rem; cursor: pointer; width: 100%; margin-top: 8px; font-family: 'Zen Kaku Gothic New', sans-serif; transition: border-color 0.2s, color 0.2s; }
  .add-alarm-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .emoji-opt { font-size: 1.4rem; width: 42px; height: 42px; border-radius: 8px; border: 2px solid transparent; background: rgba(255,255,255,0.06); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
  .emoji-opt.selected { border-color: #4ecdc4; }
  .color-dots { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-dot { width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
  .color-dot:hover { transform: scale(1.2); }
  .color-dot.selected { border-color: white; transform: scale(1.15); }
  .save-btn { background: rgba(0,0,0,0.15); color: #111; border: 1px solid rgba(0,0,0,0.2); border-radius: 10px; padding: 13px; font-size: 0.95rem; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Zen Kaku Gothic New', sans-serif; transition: background 0.2s; margin-top: 8px; }
  .save-btn:hover { background: rgba(0,0,0,0.22); }
  .cancel-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 11px; font-size: 0.88rem; cursor: pointer; width: 100%; font-family: 'Zen Kaku Gothic New', sans-serif; margin-top: 8px; transition: color 0.2s; }
  .cancel-btn:hover { color: var(--text); }
  .form-title { font-weight: 900; font-size: 1.05rem; margin-bottom: 16px; color: #1a1a2e; }


  /* 出し忘れボタン */
  .missed-btn {
    background: none;
    border: 1px solid rgba(0,0,0,0.15);
    color: rgba(0,0,0,0.4);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .missed-btn:hover { background: rgba(255,100,100,0.1); border-color: #e94560; color: #e94560; }
  .missed-btn.active { background: rgba(233,69,96,0.15); border-color: #e94560; color: #e94560; font-weight: 700; }

  /* 今日のゴミ行 */
  .today-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 4px 0;
  }
  .today-item + .today-item { border-top: 1px solid rgba(0,0,0,0.06); }

  /* 今日大丈夫バナー */
  .all-clear {
    margin: 0 16px 8px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 16px;
    padding: 16px 20px;
    text-align: center;
    font-size: 1rem;
    font-weight: 700;
    color: #3a8000;
  }

  /* 出し忘れアラート（nextカードに出る） */
  .missed-alert {
    background: rgba(233,69,96,0.12);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.75rem;
    color: #c0002a;
    font-weight: 700;
    margin-top: 4px;
  }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(78,205,196,0.9); color: #000; padding: 12px 24px; border-radius: 32px; font-weight: 700; font-size: 0.88rem; transition: transform 0.3s; z-index: 999; white-space: nowrap; backdrop-filter: blur(8px); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .delete-btn {
    background: none;
    border: 1px solid rgba(220,50,50,0.2);
    color: rgba(200,50,50,0.5);
    border-radius: 6px;
    padding: 4px 9px;
    font-size: 0.72rem;
    cursor: pointer;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    transition: all 0.2s;
  }
  .delete-btn:hover { background: rgba(220,50,50,0.1); color: #e94560; border-color: #e94560; }

</style>
</head>
<body>

<!-- 時計ヘッダー -->
<div class="clock-header">
  <div class="today-date" id="todayDate"></div>
  <div class="clock-time" id="clockTime">00:00</div>
  <div class="today-dow" id="todayDow"></div>
</div>

<!-- 今日のゴミ -->
<div id="allClear"></div>
<div class="today-gomi" id="todayGomi"></div>

<!-- 次のゴミ -->
<div id="nextCards"></div>

<hr class="divider">

<div class="notify-wrap">
  <button class="notify-btn" id="notifyBtn" onclick="requestNotify()">🔔 通知を許可する</button>
</div>

<div class="section-title">登録済みゴミ</div>
<div class="gomi-list" id="gomiList"></div>

<div class="add-new-wrap">
  <button class="add-new-btn" onclick="openForm(null)">＋ ゴミの種類を追加</button>
</div>

<div class="add-form" id="addForm" style="display:none">
  <div class="form-title" id="formTitle">新しいゴミを追加</div>
  <div class="form-row"><label>絵文字</label><div class="emoji-row" id="emojiRow"></div></div>
  <div class="form-row"><label>名前</label><input type="text" id="inputName" placeholder="例：可燃ごみ"></div>
  <div class="form-row"><label>色</label><div class="color-dots" id="colorDots"></div></div>
  <div class="form-row"><label>収集曜日（複数可）</label><div class="day-checkboxes" id="dayCheckboxes"></div></div>
  <div class="form-row">
    <label>隔週設定（毎週なら全部外す）</label>
    <div class="week-checkboxes" id="weekCheckboxes"></div>
    <div class="week-note">チェックした週だけ収集。毎週の場合は全部外してOK。</div>
  </div>
  <div class="form-row">
    <label>アラーム（何日前の何時）</label>
    <div class="alarm-rows" id="alarmRows"></div>
    <button class="add-alarm-btn" onclick="addAlarmRow()">＋ アラームを追加</button>
  </div>
  <button class="save-btn" onclick="saveGomi()">保存</button>
  <button class="cancel-btn" onclick="cancelForm()">キャンセル</button>
</div>

<div class="toast" id="toast"></div>

<script>
const DAYS = ['日','月','火','水','木','金','土'];
const DAYS_FULL = ['日曜日','月曜日','火曜日','水曜日','木曜日','金曜日','土曜日'];
const EMOJIS = ['🔥','♻️','📦','🍶','🥫','🪣','🧴','🗞️','👕','🔋','💡','🪨','📱','💻','📺','🖨️','🎮','🛏','🚿','🪑','🛋️','🔌'];
const COLORS = ['#e94560','#f5a623','#4ecdc4','#a29bfe','#fd79a8','#55efc4','#fdcb6e','#74b9ff','#e17055','#00b894'];

let gomiData = JSON.parse(localStorage.getItem('gomiData') || '[]');
let editIndex = null, selectedEmoji = EMOJIS[0], selectedColor = COLORS[0], alarmRows = [];

function saveData() { localStorage.setItem('gomiData', JSON.stringify(gomiData)); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// 背景を今日の曜日に合わせる
function applyDayTheme() {
  const dow = new Date().getDay();
  document.body.className = `day-${dow}`;
}

// 時計更新
function updateClock() {
  const now = new Date();
  const dow = now.getDay();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}`;
  document.getElementById('todayDow').textContent = DAYS_FULL[dow];
  document.getElementById('todayDate').textContent =
    `${now.getFullYear()} / ${now.getMonth()+1} / ${now.getDate()}`;

  // 日付変わり目で背景更新
  const currentDow = `day-${dow}`;
  if (!document.body.classList.contains(currentDow)) applyDayTheme();
}

// 第N週判定
function getNthWeekOfMonth(date) {
  const dow = date.getDay();
  const first = new Date(date.getFullYear(), date.getMonth(), 1);
  const offset = (dow - first.getDay() + 7) % 7;
  return Math.floor((date.getDate() - (1 + offset)) / 7) + 1;
}

function isCollectionDay(g, date) {
  if (!g.days.includes(DAYS[date.getDay()])) return false;
  if (g.weeks && g.weeks.length > 0 && !g.weeks.includes(getNthWeekOfMonth(date))) return false;
  return true;
}

function getNextDate(g) {
  const now = new Date();
  for (let i = 1; i <= 60; i++) {
    const d = new Date(now); d.setDate(now.getDate() + i);
    if (isCollectionDay(g, d)) return d;
  }
  return null;
}

function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}(${DAYS[d.getDay()]})`;
}

// 出し忘れフラグ：{ "ゴミ名_YYYY-MM-DD": true }
let missedFlags = JSON.parse(localStorage.getItem('missedFlags') || '{}');
function saveMissed() { localStorage.setItem('missedFlags', JSON.stringify(missedFlags)); }

function todayKey(gName) {
  const d = new Date();
  return `${gName}_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function toggleMissed(gName) {
  const key = todayKey(gName);
  if (missedFlags[key]) delete missedFlags[key]; else missedFlags[key] = true;
  saveMissed(); renderHeader(); renderList();
}

function isMissed(gName) { return !!missedFlags[todayKey(gName)]; }

// 前回出し忘れたか（直前の収集日に出し忘れフラグがあるか）
function wasMissedLast(g) {
  const now = new Date();
  for (let i = 1; i <= 60; i++) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    if (isCollectionDay(g, d)) {
      const key = `${g.name}_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      return !!missedFlags[key];
    }
  }
  return false;
}

function renderHeader() {
  const now = new Date();
  const today = new Date(now); today.setHours(0,0,0,0);

  // 今日が収集日のゴミ
  const todayItems = gomiData.filter(g => g.enabled !== false && isCollectionDay(g, today));
  const todayEl = document.getElementById('todayGomi');
  const allClearEl = document.getElementById('allClear');

  if (todayItems.length > 0) {
    allClearEl.innerHTML = '';
    todayEl.classList.add('visible');
    todayEl.innerHTML = todayItems.map(g => {
      const missed = isMissed(g.name);
      return `<div class="today-item">
        <strong>${getIcon(g)} ${g.name}</strong>
        <button class="missed-btn ${missed?'active':''}" onclick="toggleMissed('${g.name}')">
          ${missed ? '⚠️ 出し忘れた' : '出し忘れた'}
        </button>
      </div>`;
    }).join('');
  } else {
    todayEl.classList.remove('visible');
    todayEl.innerHTML = '';
    allClearEl.innerHTML = '<div class="all-clear">✅ 今日は大丈夫</div>';
  }

  // 次のゴミ（最大2件、近い順）
  const active = gomiData.filter(g => g.enabled !== false && g.days.length > 0);
  const withDates = active.map(g => ({ g, nd: getNextDate(g) })).filter(x => x.nd).sort((a,b) => a.nd - b.nd);
  const top2 = withDates.slice(0, 2);

  const container = document.getElementById('nextCards');
  if (!top2.length) { container.innerHTML = ''; return; }

  container.innerHTML = top2.map(({ g, nd }, idx) => {
    const diff = Math.round((nd - now) / (1000*60*60*24));
    let msg = diff <= 1 ? `明日は ${g.emoji} ${g.name}の日！` : `次は ${g.emoji} ${g.name}`;
    let dateStr = diff <= 1 ? '準備はいい？' : formatDate(nd) + `（あと${diff}日）`;
    const missedAlert = wasMissedLast(g) ? `<div class="missed-alert">⚠️ 前回出し忘れてる！絶対忘れるな！</div>` : '';
    return `<div class="next-card" style="margin-bottom:${idx===0?'8px':'20px'}">
      <div class="next-emoji">${getIcon(g)}</div>
      <div style="flex:1">
        <div class="next-label">NEXT COLLECTION</div>
        <div class="next-msg">${msg}</div>
        <div class="next-date">${dateStr}</div>
        ${missedAlert}
      </div>
    </div>`;
  }).join('');
}

function renderList() {
  const list = document.getElementById('gomiList');
  if (!gomiData.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">まだ登録なし。下の「追加」から始めてね。</div>';
    return;
  }
  list.innerHTML = gomiData.map((g, i) => {
    const daySpans = g.days.map(d => `<span>${d}</span>`).join('');
    const weeksBadge = (g.weeks && g.weeks.length > 0) ? `<span class="weeks-badge">第${g.weeks.join('・')}週</span>` : '';
    const nd = getNextDate(g);
    const nextStr = nd ? formatDate(nd) : '-';
    const on = g.enabled !== false;
    return `<div class="gomi-card">
      <div class="gomi-card-stripe" style="background:${g.color}"></div>
      <div class="gomi-emoji">${getIcon(g)}</div>
      <div class="gomi-info">
        <div class="gomi-name">${g.name}</div>
        <div class="gomi-days">${daySpans}${weeksBadge}</div>
        <div class="gomi-next-date">次回 ${nextStr}</div>
      </div>
      <button class="edit-btn" onclick="openForm(${i})">編集</button>
      <button class="delete-btn" onclick="deleteGomi(${i})">削除</button>
      <button class="toggle-btn ${on?'on':''}" onclick="toggleGomi(${i})"></button>
    </div>`;
  }).join('');
  renderHeader();
}


// kidsIconsからアイコンを取得（なければ絵文字）
function getIcon(g) {
  const kids = JSON.parse(localStorage.getItem('kidsIcons') || '[]');
  const found = kids.find(k => k.name === g.name);
  if (found && found.imageDataUrl) {
    return `<img src="${found.imageDataUrl}" style="width:36px;height:36px;object-fit:cover;border-radius:8px;">`;
  }
  return g.emoji;
}

function deleteGomi(i) {
  if (!confirm('「' + gomiData[i].name + '」を削除する？')) return;
  gomiData.splice(i, 1);
  saveData(); renderList(); scheduleAll();
  showToast('削除したよ');
}

function toggleGomi(i) {
  gomiData[i].enabled = !(gomiData[i].enabled !== false);
  saveData(); renderList(); scheduleAll();
}

// アラームUI
function buildAlarmRows(alarms) { alarmRows = alarms.map(a => ({...a})); renderAlarmRows(); }
function renderAlarmRows() {
  document.getElementById('alarmRows').innerHTML = alarmRows.map((a, i) => `
    <div class="alarm-row">
      <select onchange="alarmRows[${i}].daysBefore=parseInt(this.value)">
        ${[2,1,0].map(d => `<option value="${d}" ${a.daysBefore===d?'selected':''}>${d===0?'当日':d+'日前'}</option>`).join('')}
      </select>
      <input type="time" value="${a.time}" onchange="alarmRows[${i}].time=this.value">
      <button class="rm-alarm" onclick="removeAlarmRow(${i})">×</button>
    </div>`).join('');
}
function addAlarmRow() { alarmRows.push({ daysBefore:1, time:'20:00' }); renderAlarmRows(); }
function removeAlarmRow(i) { alarmRows.splice(i,1); renderAlarmRows(); }

function renderFormExtras(selectedWeeks) {
  document.getElementById('emojiRow').innerHTML = EMOJIS.map(e =>
    `<div class="emoji-opt ${e===selectedEmoji?'selected':''}" onclick="selectEmoji('${e}')">${e}</div>`).join('');
  document.getElementById('colorDots').innerHTML = COLORS.map(c =>
    `<div class="color-dot ${c===selectedColor?'selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
  document.getElementById('dayCheckboxes').innerHTML = DAYS.map((d,i) =>
    `<div class="day-check"><input type="checkbox" id="day${i}" value="${d}"><span>${d}</span></div>`).join('');
  document.getElementById('weekCheckboxes').innerHTML = [1,2,3,4,5].map(w =>
    `<div class="week-check"><input type="checkbox" id="week${w}" value="${w}" ${(selectedWeeks||[]).includes(w)?'checked':''}><span>第${w}週</span></div>`).join('');
}
function selectEmoji(e) {
  selectedEmoji = e;
  document.querySelectorAll('.emoji-opt').forEach(el => el.classList.toggle('selected', el.textContent===e));
}
function selectColor(c) {
  selectedColor = c;
  document.querySelectorAll('.color-dot').forEach(el => el.classList.toggle('selected', el.style.backgroundColor===hexToRgb(c)));
}
function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${r}, ${g}, ${b})`;
}

function openForm(index) {
  editIndex = index;
  if (index===null) {
    selectedEmoji=EMOJIS[0]; selectedColor=COLORS[0];
    renderFormExtras([]);
    document.getElementById('inputName').value='';
    DAYS.forEach((_,i)=>document.getElementById('day'+i).checked=false);
    buildAlarmRows([{daysBefore:1,time:'20:00'}]);
    document.getElementById('formTitle').textContent='新しいゴミを追加';
  } else {
    const g=gomiData[index]; selectedEmoji=g.emoji; selectedColor=g.color;
    renderFormExtras(g.weeks||[]);
    document.getElementById('inputName').value=g.name;
    DAYS.forEach((d,i)=>document.getElementById('day'+i).checked=g.days.includes(d));
    buildAlarmRows(g.alarms||[]);
    document.getElementById('formTitle').textContent='編集';
  }
  document.getElementById('addForm').style.display='block';
  document.getElementById('addForm').scrollIntoView({behavior:'smooth'});
}
function cancelForm() { document.getElementById('addForm').style.display='none'; }

function saveGomi() {
  const name=document.getElementById('inputName').value.trim();
  if (!name) { showToast('名前を入れてね'); return; }
  const days=DAYS.filter((_,i)=>document.getElementById('day'+i).checked);
  const weeks=[1,2,3,4,5].filter(w=>document.getElementById('week'+w).checked);
  const item={emoji:selectedEmoji,name,color:selectedColor,days,weeks,alarms:alarmRows.filter(a=>a.time),enabled:true};
  if (editIndex===null) gomiData.push(item); else gomiData[editIndex]=item;
  saveData(); renderList(); cancelForm(); scheduleAll();
  showToast(editIndex===null?'追加したよ！':'更新したよ！'); editIndex=null;
}

async function requestNotify() {
  if (!('Notification' in window)) { showToast('このブラウザは通知非対応'); return; }
  const perm=await Notification.requestPermission();
  if (perm==='granted') {
    document.getElementById('notifyBtn').textContent='✅ 通知ON';
    document.getElementById('notifyBtn').classList.add('granted');
    showToast('通知が許可されました！'); scheduleAll();
  } else showToast('通知が拒否されました');
}

function scheduleAll() {
  if (Notification.permission!=='granted') return;
  const now=new Date();
  for (const g of gomiData) {
    if (g.enabled===false) continue;
    for (const alarm of (g.alarms||[])) {
      const [hh,mm]=alarm.time.split(':').map(Number);
      for (let ahead=0; ahead<=14; ahead++) {
        const target=new Date(now); target.setDate(now.getDate()+ahead);
        if (!isCollectionDay(g,target)) continue;
        const fire=new Date(target); fire.setDate(target.getDate()-alarm.daysBefore); fire.setHours(hh,mm,0,0);
        const delay=fire-now;
        if (delay>0 && delay<15*24*60*60*1000) {
          const msg=alarm.daysBefore===0?`今日は${g.emoji} ${g.name}の日！`:`${alarm.daysBefore===1?'明日':alarm.daysBefore+'日後'}は${g.emoji} ${g.name}の日！そろそろ準備して`;
          setTimeout(()=>new Notification('🗑️ ゴミ出しアラーム',{body:msg}),delay);
        }
      }
    }
  }
}

// 初期化
window.addEventListener('load', () => {
  applyDayTheme();
  updateClock();
  setInterval(updateClock, 1000);

  if (Notification.permission==='granted') {
    document.getElementById('notifyBtn').textContent='✅ 通知ON';
    document.getElementById('notifyBtn').classList.add('granted');
    scheduleAll();
  }

  if (!gomiData.length) {
    gomiData=[
      {emoji:'🔥',name:'可燃ごみ',        color:'#e94560',days:['月','木'],weeks:[],   alarms:[{daysBefore:1,time:'21:00'},{daysBefore:0,time:'07:00'}],enabled:true},
      {emoji:'🪨',name:'不燃ごみ',        color:'#a29bfe',days:['水'],     weeks:[3],  alarms:[{daysBefore:2,time:'20:00'},{daysBefore:1,time:'20:00'}],enabled:true},
      {emoji:'♻️',name:'資源化物',        color:'#4ecdc4',days:['金'],     weeks:[2,4],alarms:[{daysBefore:2,time:'20:00'},{daysBefore:1,time:'20:00'},{daysBefore:0,time:'07:00'}],enabled:true},
      {emoji:'🧴',name:'プラスチック資源',  color:'#74b9ff',days:['火'],weeks:[],   alarms:[{daysBefore:1,time:'20:00'},{daysBefore:0,time:'07:00'}],enabled:true},
      {emoji:'🔌',name:'小型家電回収ボックス',color:'#C77DFF',days:[],    weeks:[],   alarms:[],enabled:true},
      {emoji:'🛋️',name:'粗大ごみ',            color:'#FF6B6B',days:[],    weeks:[],   alarms:[{daysBefore:3,time:'20:00'}],enabled:true},
    ];
    saveData();
  }
  renderList();
});
</script>
